<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieExplorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <header>
        <div class="container">
           <h1> MovieExplorer </h1>
            <nav class="nav-links">
                <a href="#">Home</a>
                <a href="#">Popular</a>
                <a href="#">Top Rated</a>
                <a href="#">Now Playing</a>
                <a href="#">Watchlist</a>
            </nav>

            <div class="search-container">
                <input type="text" id="searchInput"  placeholder="Search Movies..." >
                <button id="searchBtn">Search</button>
            </div>
        </div>
    </header>

    <main class="container">
        <h1 id="pageTitle">Popular Movies</h1>
        <div id="loading" class="loading" >Loading Movies</div>
        <div id="error" class="error hidden" >Something went wrong</div>
        <div id="moviesGrid" class="movies-grid"></div>
        
    </main>

 <div id="movieModal" class="modal hidden">
    <div class="modal-content">
        <div id="modalBody" class="modal-body"></div>
    </div>
 </div>

    <footer>

    </footer>
    <script src="script.js"></script>
</body>
</html>
